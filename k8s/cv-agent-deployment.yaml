apiVersion: apps/v1
kind: Deployment
metadata:
  name: cv-agent
  namespace: construction-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cv-agent
  template:
    metadata:
      labels:
        app: cv-agent
    spec:
      containers:
      - name: cv-agent
        image: locleon123/cv-agent:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"   # ← Исправлено: Mi (мегабибайты), а не mi
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /health     # ← Замени на реальный endpoint твоего CV-агента
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
