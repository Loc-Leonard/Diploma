# ------------------------------------------------------------
#  SPA‑fallback + базовый кеш статических файлов
# ------------------------------------------------------------
server {
    listen       80;
    server_name  _;               # любой хост

    # --------------------------------------------------------
    # 1️⃣ Кешируем типовые статические файлы
    # --------------------------------------------------------
    location ~* \.(js|css|png|jpe?g|svg|gif|ico|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --------------------------------------------------------
    # 2️⃣ Защищаем конфиги и скрытые файлы
    # --------------------------------------------------------
    location ~ /\.(?!well-known) {
        deny all;
    }

    # --------------------------------------------------------
    # 3️⃣ SPA‑fallback – всё, что не найдено, отдаем index.html
    # --------------------------------------------------------
    location / {
        # $uri – запрошенный путь (напр. /foo/bar)
        # $uri/ – попытка добавить завершающий слеш (для каталогов)
        # Если ничего не найдено → возвращаем /index.html
        try_files $uri $uri/ /index.html;
    }

    # --------------------------------------------------------
    # 4️⃣ Ошибки 404 – тоже отдаём index.html (для History API)
    # --------------------------------------------------------
    error_page 404 =200 /index.html;
}