services:
  frontend-dev:
    build:
      context: ./frontend       
      dockerfile: Dockerfile   
      target: dev                
    container_name: frontend-dev
    ports:
      - "5173:5173" 
    # volumes:
    #   - ./frontend:/app
      # - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL}
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - backend-net
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      cv-agent:
        condition: service_started
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      CV_SERVICE_URL: http://cv-agent:8000
      STORAGE_ROOT: /app/storage
    volumes:
      - storage:/app/storage
    networks:
      - backend-net
    restart: unless-stopped

  cv-agent:
    build:
      context: ./Learning CV/agent
      dockerfile: Dockerfile
    # ports:
    #   - "8000:8000"
    networks:
      - backend-net
    restart: unless-stopped
  
  postgres:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      retries: 5
    networks:
      - backend-net
    restart: unless-stopped

networks:
  backend-net:
    driver: bridge

volumes:
  pgdata: 
  storage:
