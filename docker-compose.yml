services:
  frontend-dev:
    build:
      context: ./frontend          # путь от корня репозитория
      dockerfile: Dockerfile       # по‑умолчанию ищет Dockerfile
      target: dev                 # явно указываем цель (можно опустить, т.к. один слой)
    container_name: frontend-dev
    ports:
      - "5173:5173"                # Vite‑dev‑сервер (http://localhost:5173)
    volumes:
      # 1️⃣ Монтируем весь исходный код в контейнер
      - ./frontend:/app
      # 2️⃣ Объём для node_modules, чтобы он не стирался при монтировании кода
      - /app/node_modules
    environment:
      # Пример: передаём URL бекенда в Vite (переменные, начинающиеся с VITE_)
      - VITE_API_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - backend-net
    restart: unless-stopped

  backend:
    image: new_app
    depends_on:
      postgres:
        condition: service_healthy
      cv-agent:
        condition: service_started
    # ports:
    #   - "8080:8080"
    env_file:
      - .env
    environment:
      CV_SERVICE_URL: http://cv-agent:8000
      STORAGE_ROOT: /app/storage
    volumes:
      - storage:/app/storage
    networks:
      - backend-net
    restart: unless-stopped

  cv-agent:
    build:
      context: ./Learning CV/agent
      dockerfile: Dockerfile
    # ports:
    #   - "8000:8000"
    networks:
      - backend-net
    restart: unless-stopped
  
  postgres:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      retries: 5
    networks:
      - backend-net
    restart: unless-stopped

networks:
  backend-net:
    driver: bridge

volumes:
  pgdata: 
  storage:
